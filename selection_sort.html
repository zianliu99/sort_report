<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇排序法學習工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
            border-radius: 12px 12px 0 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 0 0 12px 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .visualization {
            background: linear-gradient(to right, #f5f7fa 0%, #c3cfe2 100%);
            padding: 40px 20px;
            border-radius: 12px;
            margin: 30px 0;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            gap: 10px;
        }
        .bars-container {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 8px;
            height: 200px;
            margin-bottom: 20px;
        }
        .bar-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .bar {
            width: 40px;
            background: linear-gradient(180deg, #4CAF50 0%, #45a049 100%);
            border-radius: 4px 4px 0 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 2px solid #45a049;
        }
        .bar.searching {
            background: linear-gradient(180deg, #FF9800 0%, #F57C00 100%);
            border-color: #FF6F00;
            box-shadow: 0 0 15px rgba(255, 152, 0, 0.5);
            transform: scale(1.05);
        }
        .bar.selected {
            background: linear-gradient(180deg, #F44336 0%, #D32F2F 100%);
            border-color: #C62828;
            box-shadow: 0 0 15px rgba(244, 67, 54, 0.5);
            animation: pulse 0.3s ease-in-out;
        }
        .bar.sorted {
            background: linear-gradient(180deg, #8BC34A 0%, #7CB342 100%);
            border-color: #689F38;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .bar-label {
            font-weight: bold;
            color: #333;
            font-size: 14px;
            min-width: 40px;
            text-align: center;
        }
        .controls {
            text-align: center;
            margin: 25px 0;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.3);
        }
        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }
        button:disabled {
            background: linear-gradient(135deg, #ccc 0%, #aaa 100%);
            cursor: not-allowed;
            opacity: 0.6;
        }
        .input-group {
            margin: 25px 0;
            text-align: center;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
        }
        .input-group label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }
        input {
            padding: 12px;
            width: 250px;
            border: 2px solid #ddd;
            border-radius: 6px;
            margin-right: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #f5576c;
        }
        .steps {
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #e8f5e8 0%, #dcedc8 100%);
            border-left: 5px solid #4CAF50;
            border-radius: 6px;
        }
        .steps h3 {
            color: #2d5016;
            margin-bottom: 12px;
        }
        .steps p {
            margin: 6px 0;
            color: #333;
            line-height: 1.6;
        }
        .complexity {
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #fff3cd 0%, #ffe69c 100%);
            border-left: 5px solid #ffc107;
            border-radius: 6px;
        }
        .complexity h3 {
            color: #7a4a00;
            margin-bottom: 12px;
        }
        .complexity p {
            margin: 8px 0;
            color: #333;
            line-height: 1.6;
        }
        #current-step {
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-left: 5px solid #2196F3;
            border-radius: 6px;
        }
        #current-step h3 {
            color: #0d47a1;
            margin-bottom: 10px;
        }
        #step-info {
            color: #333;
            font-size: 1.05em;
            font-weight: 500;
        }
        .back-link {
            margin-top: 25px;
            text-align: center;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .back-link a {
            color: #f5576c;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        .back-link a:hover {
            color: #f093fb;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🎯 選擇排序法</h1>
        <p>互動式學習工具 - 逐步演示排序過程</p>
    </div>
    <div class="container">
        
        <div class="input-group">
            <label for="array-input">輸入要排序的數字（用逗號分隔）：</label>
            <input type="text" id="array-input" placeholder="例如: 5,3,8,4,2" value="5,3,8,4,2">
            <button onclick="initializeArray()">初始化陣列</button>
        </div>
        
        <div class="visualization">
            <div class="bars-container" id="bars-container"></div>
        </div>
        
        <div class="controls">
            <button id="prev-btn" onclick="previousStep()" disabled>⬅ 上一步</button>
            <button id="start-btn" onclick="startSort()" disabled>▶ 開始排序</button>
            <button id="step-btn" onclick="nextStep()" disabled>下一步 ➡</button>
            <button id="reset-btn" onclick="reset()">🔄 重置</button>
        </div>
        
        <div class="steps">
            <h3>📚 操作過程步驟：</h3>
            <div id="steps-content">
                <p>1. 從陣列中找到最小的元素。</p>
                <p>2. 將最小元素與陣列的第一個位置交換。</p>
                <p>3. 在剩餘的未排序元素中重複步驟1和2。</p>
                <p>4. 每次循環後，已排序區域會擴展一個元素。</p>
                <p>5. 直到整個陣列被排序。</p>
            </div>
        </div>
        
        <div class="complexity">
            <h3>⏱️ 操作複雜度：</h3>
            <p><strong>時間複雜度：</strong>O(n²) - 每個位置都需要查找最小值，在最壞、平均和最好情況下都是O(n²)。</p>
            <p><strong>空間複雜度：</strong>O(1) - 只使用固定的額外空間。</p>
            <p><strong>穩定性：</strong>✗ 不穩定排序 - 相等元素的相對順序可能會改變。</p>
        </div>
        
        <div id="current-step">
            <h3>📍 當前步驟：</h3>
            <p id="step-info">請先初始化陣列</p>
        </div>

        <div class="back-link">
            <a href="index.html">← 返回主頁</a>
        </div>
    </div>

    <script>
        let array = [];
        let originalArray = [];
        let history = [];
        let currentStep = -1;
        let isSorting = false;
        let i = 0;
        let maxValue = 0;

        function initializeArray() {
            const input = document.getElementById('array-input').value;
            const numbers = input.split(',').map(num => parseInt(num.trim())).filter(num => !isNaN(num));
            
            if (numbers.length === 0) {
                alert('請輸入有效的數字');
                return;
            }
            
            array = [...numbers];
            originalArray = [...numbers];
            maxValue = Math.max(...array);
            history = [{ array: [...array], searching: [], selected: -1, sorted: [] }];
            currentStep = 0;
            i = 0;
            isSorting = false;
            
            renderBars();
            updateButtons();
            document.getElementById('step-info').textContent = '陣列已初始化，點擊"開始排序"開始';
        }

        function renderBars() {
            const container = document.getElementById('bars-container');
            container.innerHTML = '';
            
            const state = history[currentStep] || { array, searching: [], selected: -1, sorted: [] };
            
            state.array.forEach((num, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'bar-wrapper';
                
                const bar = document.createElement('div');
                bar.className = 'bar';
                bar.id = `bar-${index}`;
                
                const height = (num / maxValue) * 150;
                bar.style.height = height + 'px';
                
                if (state.sorted.includes(index)) {
                    bar.classList.add('sorted');
                } else if (index === state.selected) {
                    bar.classList.add('selected');
                } else if (state.searching.includes(index)) {
                    bar.classList.add('searching');
                }
                
                const label = document.createElement('div');
                label.className = 'bar-label';
                label.textContent = num;
                
                wrapper.appendChild(bar);
                wrapper.appendChild(label);
                container.appendChild(wrapper);
            });
        }

        function updateButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const startBtn = document.getElementById('start-btn');
            const stepBtn = document.getElementById('step-btn');
            
            prevBtn.disabled = currentStep <= 0 || isSorting;
            startBtn.disabled = array.length === 0 || isSorting;
            stepBtn.disabled = array.length === 0 || isSorting || isArraySorted();
        }

        function isArraySorted() {
            for (let k = 0; k < array.length - 1; k++) {
                if (array[k] > array[k + 1]) return false;
            }
            return true;
        }

        function nextStep() {
            if (currentStep >= history.length - 1) {
                if (i >= array.length - 1) {
                    document.getElementById('step-info').textContent = '🎉 排序完成！';
                    updateButtons();
                    renderBars();
                    return;
                }
                
                // 找最小值
                let minIndex = i;
                const searching = [];
                for (let k = i + 1; k < array.length; k++) {
                    searching.push(k);
                    if (array[k] < array[minIndex]) {
                        minIndex = k;
                    }
                }
                
                history.push({
                    array: [...array],
                    searching: searching,
                    selected: minIndex,
                    sorted: Array.from({length: i}, (_, idx) => idx)
                });
                
                // 交換
                [array[i], array[minIndex]] = [array[minIndex], array[i]];
                history.push({
                    array: [...array],
                    searching: [],
                    selected: -1,
                    sorted: Array.from({length: i + 1}, (_, idx) => idx)
                });
                
                i++;
            }
            
            currentStep++;
            if (currentStep < history.length) {
                array = [...history[currentStep].array];
            }
            
            updateStepInfo();
            renderBars();
            updateButtons();
        }

        function previousStep() {
            if (currentStep > 0) {
                currentStep--;
                array = [...history[currentStep].array];
                updateStepInfo();
                renderBars();
                updateButtons();
            }
        }

        function updateStepInfo() {
            const state = history[currentStep];
            let info = `步驟 ${currentStep}: `;
            
            if (state.selected >= 0) {
                info += `在位置 [${i}, ${array.length - 1}] 找到最小值 ${array[state.selected]}`;
            } else if (state.sorted.length > 0) {
                info += `已排序 ${state.sorted.length} 個元素`;
            } else {
                info = '開始排序...';
            }
            
            document.getElementById('step-info').textContent = info;
        }

        function startSort() {
            if (isSorting) return;
            isSorting = true;
            document.getElementById('step-info').textContent = '正在自動排序...';
            
            function autoStep() {
                if (currentStep >= history.length - 1 && isArraySorted()) {
                    document.getElementById('step-info').textContent = '🎉 排序完成！';
                    isSorting = false;
                    updateButtons();
                    return;
                }
                
                nextStep();
                setTimeout(autoStep, 600);
            }
            
            setTimeout(autoStep, 600);
        }

        function reset() {
            array = [...originalArray];
            history = [{ array: [...array], searching: [], selected: -1, sorted: [] }];
            currentStep = 0;
            i = 0;
            isSorting = false;
            renderBars();
            updateButtons();
            document.getElementById('step-info').textContent = '已重置，點擊"開始排序"重新開始';
        }

        updateButtons();
    </script>
</body>
</html>

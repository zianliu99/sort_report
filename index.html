<!DOCTYPE html>
<html lang="zh-tw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>排序算法學習工具</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .nav-links {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 30px 0;
        }
        .nav-card {
            border: 2px solid #2196F3;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: all 0.3s ease;
            background-color: #f9f9f9;
        }
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(33, 150, 243, 0.3);
            background-color: #e3f2fd;
        }
        .nav-card a {
            color: #2196F3;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            display: block;
        }
        .nav-card p {
            margin: 10px 0 0 0;
            color: #666;
            font-size: 14px;
        }
        .array-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .array-element {
            width: 40px;
            height: 40px;
            margin: 0 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #4CAF50;
            color: white;
            font-weight: bold;
            border-radius: 4px;
            transition: background-color 0.3s;
        }
        .array-element.comparing {
            background-color: #FF9800;
        }
        .array-element.swapping {
            background-color: #F44336;
        }
        .controls {
            text-align: center;
            margin: 20px 0;
        }
        button {
            padding: 10px 20px;
            margin: 0 10px;
            background-color: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0b7dda;
        }
        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        .steps {
            margin: 20px 0;
            padding: 10px;
            background-color: #e8f5e8;
            border-left: 5px solid #4CAF50;
        }
        .complexity {
            margin: 20px 0;
            padding: 10px;
            background-color: #fff3cd;
            border-left: 5px solid #ffc107;
        }
        .input-group {
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>排序算法學習工具</h1>
        <p style="text-align: center; color: #666; margin-bottom: 30px;">選擇下面的排序方法開始學習</p>
        
        <div class="nav-links">
            <div class="nav-card">
                <a href="bubble_sort.html">氣泡排序法</a>
                <p>時間複雜度: O(n²)</p>
            </div>
            <div class="nav-card">
                <a href="selection_sort.html">選擇排序法</a>
                <p>時間複雜度: O(n²)</p>
            </div>
            <div class="nav-card">
                <a href="insertion_sort.html">插入排序法</a>
                <p>時間複雜度: O(n²)</p>
            </div>
            <div class="nav-card">
                <a href="merge_sort.html">合併排序法</a>
                <p>時間複雜度: O(n log n)</p>
            </div>
        </div>
    </div>

    <script>
        // 主页面脚本（可选）
    </script>
</body>
</html>
